<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
</head>

<body>
    <div class="container">
        <div class="board"></div>
        <div class="player-wrapper">
            <div class="player1">
                <div class="name">
                    <input type="text" id="player1-input" placeholder="Player1" maxlength="10" required>
                </div>
                <div class="symbol">X</div>
            </div>
            <div class="player2">
                <div class="name">
                    <input type="text" id="player2-input" placeholder="Player2" maxlength="10" required>
                </div>
                <div class="symbol">O</div>
            </div>
        </div>
        <div class="info-wrapper">
            <div class="info">
                <div>Info:</div>
                <div class="msgbox"></div>
            </div>
            <div class="score">
                <div>Score:</div>
                <div>
                    <div class="player1-label">Player 1:</div>
                    <div class="player1-score">0</div>
                </div>
                <div>
                    <div class="player2-label">Player 2:</div>
                    <div class="player2-score">0</div>
                </div>
            </div>
            <div class="controls">
                <button class="play">Play</button>
            </div>
        </div>
    </div>
</body>

</html>
